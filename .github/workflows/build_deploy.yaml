name: Build and Deploy to AWS

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**/README.md'

jobs:
  infra:
    runs-on: ubuntu-latest
    outputs:
      cognito_client_id:    ${{ steps.tf_output.outputs.cognito_client_id }}
      cognito_domain:       ${{ steps.tf_output.outputs.cognito_domain }}
      amplify_app_id:       ${{ steps.tf_output.outputs.amplify_app_id }}
      amplify_app_url:      ${{ steps.tf_output.outputs.amplify_app_url }}
      api_stage_invoke_url: ${{ steps.tf_output.outputs.api_stage_invoke_url}}
    
    env:
      AWS_ACCESS_KEY_ID: ${{secrets.AWS_ACCESS_KEY_ID}}
      AWS_SECRET_ACCESS_KEY: ${{secrets.AWS_SECRET_ACCESS_KEY}}

    steps:
      - uses: actions/checkout@v4

      - name: Make terraform.sh executable
        run: chmod +x .github/scripts/terraform.sh

      - name: Provision using Terraform
        run: |
          .github/scripts/terraform.sh init
          .github/scripts/terraform.sh apply -auto-approve

      - name: Capture Terraform outputs
        id: tf_output
        run: |
          COGNITO_CLIENT_ID=$(.github/scripts/terraform.sh output -raw cognito_client_id 2>/dev/null | tr -d '\n')
          COGNITO_DOMAIN=$(.github/scripts/terraform.sh output -raw cognito_domain 2>/dev/null | tr -d '\n')
          AMPLIFY_APP_ID=$(.github/scripts/terraform.sh output -raw amplify_app_id 2>/dev/null | tr -d '\n')
          AMPLIFY_APP_URL=$(.github/scripts/terraform.sh output -raw amplify_app_url 2>/dev/null | tr -d '\n')
          API_STAGE=$(.github/scripts/terraform.sh output -raw api_stage 2>/dev/null | tr -d '\n')

          printf "cognito_client_id=%s\n" "$COGNITO_CLIENT_ID" >> $GITHUB_OUTPUT
          printf "cognito_domain=%s\n"    "$COGNITO_DOMAIN"    >> $GITHUB_OUTPUT
          printf "amplify_app_id=%s\n"    "$AMPLIFY_APP_ID"    >> $GITHUB_OUTPUT
          printf "amplify_app_url=%s\n"   "$AMPLIFY_APP_URL"   >> $GITHUB_OUTPUT
          printf "api_stage_invoke_url=%s\n" "$API_STAGE"      >> $GITHUB_OUTPUT

          # Debug — print what we captured
          cat $GITHUB_OUTPUT

  deploy:
    runs-on: ubuntu-latest
    needs: infra

    env:
      AWS_ACCESS_KEY_ID: ${{secrets.AWS_ACCESS_KEY_ID}}
      AWS_SECRET_ACCESS_KEY: ${{secrets.AWS_SECRET_ACCESS_KEY}}

    steps:
      - uses: actions/checkout@v4

      - name: Generate config.js from Terraform outputs
        working-directory: frontend
        run: |
          cat > config.js <<EOF
          const CONFIG = {
            COGNITO_DOMAIN:       "${{ needs.infra.outputs.cognito_domain }}",
            CLIENT_ID:            "${{ needs.infra.outputs.cognito_client_id }}",
            REDIRECT_URI:         "${{ needs.infra.outputs.amplify_app_url }}",
            API_STAGE_INVOKE_URL: "${{ needs.infra.outputs.api_stage_invoke_url }}"
          };
          EOF

      - name: Zip and upload to S3
        working-directory: frontend
        run: |
          zip -j deploy.zip index.html authentication.js config.js
          aws s3 cp deploy.zip s3://read-for-me-frontend/deploy.zip

      - name: Deploy to Amplify
        run: |
          aws amplify start-deployment \
            --app-id ${{ needs.infra.outputs.amplify_app_id }} \
            --branch-name dev \
            --source-url s3://read-for-me-frontend/deploy.zip \
            --source-url-type ZIP \
            --region ap-south-1